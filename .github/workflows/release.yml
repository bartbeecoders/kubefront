name: Release

# Builds, self-signs, and publishes downloadable installers to a GitHub Release.
#
# Signing (self-signed — for integrity/demo, NOT trusted-CA distribution):
#   • Windows — an Authenticode certificate is generated in-CI and wired into
#     the Tauri bundler, so the .exe (NSIS) and .msi are signed during build.
#     Users still see a SmartScreen "unknown publisher" prompt (expected for
#     self-signed); for trusted distribution, use a real CA cert.
#   • Linux — there is no OS-level code signing, so artifacts (.deb/.AppImage/
#     .rpm) get GPG detached signatures (.asc). The matching public key is
#     attached as kubefront-linux-signing-pubkey.asc; verify with:
#       gpg --import kubefront-linux-signing-pubkey.asc
#       gpg --verify KubeFront_x.y.z_amd64.AppImage.asc KubeFront_x.y.z_amd64.AppImage
#
# How to cut a release (the tag is the single source of truth for the version):
#   1. git tag vX.Y.Z && git push --follow-tags
#      The build derives X.Y.Z from the tag and stamps it into package.json,
#      tauri.conf.json, and Cargo.toml automatically (scripts/set-version.mjs),
#      so you never have to hand-edit version files.
#   Optional local one-shot: `npm run bump 0.2.3` syncs all manifests + commits,
#   then `git tag v0.2.3 && git push --follow-tags`.
# Or run it manually from the Actions tab (workflow_dispatch) — there the version
# falls back to whatever is in package.json.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build, sign & publish (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04 # Linux: .deb + .AppImage (+ GPG .asc)
          - platform: windows-latest # Windows: signed .exe (NSIS) + .msi

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Vendored OpenSSL (openssl-sys) needs NASM to assemble on Windows MSVC.
      # Perl is already provided by the runner's Strawberry Perl.
      - name: Install NASM (Windows, for vendored OpenSSL)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nasm -y --no-progress
          "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libappindicator3-dev \
            patchelf

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # The pushed tag drives the version. On a tag build we take vX.Y.Z from the
      # ref; on a manual (workflow_dispatch) run there is no tag, so we fall back
      # to package.json. Either way we stamp the resolved version into all
      # manifests so the built installers carry the right number.
      - name: Resolve release version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$VERSION" >> "$GITHUB_ENV"

      - name: Stamp version into manifests
        shell: bash
        run: node scripts/set-version.mjs "$VERSION"

      # --- Windows: generate a self-signed code-signing cert and tell Tauri to use it ---
      - name: Create self-signed code-signing certificate (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject "CN=KubeFront Self-Signed" `
            -KeyAlgorithm RSA -KeyLength 2048 -HashAlgorithm SHA256 `
            -KeyUsage DigitalSignature -KeyExportPolicy Exportable `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -NotAfter (Get-Date).AddYears(5) `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3")
          Add-Content -Path $env:GITHUB_ENV -Value "WIN_CERT_THUMB=$($cert.Thumbprint)"
          Write-Host "Created self-signed cert: $($cert.Thumbprint)"
          # Export the public cert so users can optionally trust the publisher on
          # machines they control (see README "Installing a release").
          Export-Certificate -Cert $cert -FilePath "kubefront-windows-signing-pubcert.cer" -Type CERT | Out-Null

      - name: Inject Windows signing config into tauri.conf.json
        if: runner.os == 'Windows'
        shell: bash
        run: |
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p,'utf8'));c.bundle=c.bundle||{};c.bundle.windows=Object.assign({},c.bundle.windows,{certificateThumbprint:process.env.WIN_CERT_THUMB,digestAlgorithm:'sha256'});fs.writeFileSync(p,JSON.stringify(c,null,2));console.log('Injected thumbprint '+process.env.WIN_CERT_THUMB);"

      # --- Build + publish (Tauri signs the Windows bundles via the injected thumbprint) ---
      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "KubeFront ${{ env.RELEASE_TAG }}"
          releaseBody: |
            Download the installer for your platform from the assets below.

            **Windows** installers are Authenticode-signed with a **self-signed**
            certificate, so SmartScreen will show "Windows protected your PC /
            unknown publisher" — this is expected and not a sign of infection.
            Click **More info → Run anyway** to install. To trust the publisher on
            a machine you control, import the attached
            `kubefront-windows-signing-pubcert.cer`. See the README's
            "Installing a release" section for details.

            **Linux** artifacts have GPG detached signatures (`*.asc`). Verify with:
            `gpg --import kubefront-linux-signing-pubkey.asc` then
            `gpg --verify <file>.asc <file>`.
          releaseDraft: false
          prerelease: false

      # --- Windows: attach the public signing certificate for optional self-trust ---
      - name: Upload Windows signing certificate
        if: runner.os == 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" kubefront-windows-signing-pubcert.cer --clobber

      # --- Linux: GPG self-sign the built artifacts and attach signatures + public key ---
      - name: Sign Linux artifacts (GPG, self-signed) and upload signatures
        if: runner.os == 'Linux'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          export GNUPGHOME="$(mktemp -d)"
          cat > "$GNUPGHOME/keyparams" <<'EOF'
          %no-protection
          Key-Type: RSA
          Key-Length: 3072
          Name-Real: KubeFront Self-Signed
          Name-Email: releases@kube-front.dev
          Expire-Date: 0
          %commit
          EOF
          gpg --batch --gen-key "$GNUPGHOME/keyparams"
          gpg --armor --export > kubefront-linux-signing-pubkey.asc

          shopt -s nullglob
          sigs=()
          for f in \
            src-tauri/target/release/bundle/deb/*.deb \
            src-tauri/target/release/bundle/appimage/*.AppImage \
            src-tauri/target/release/bundle/rpm/*.rpm; do
            echo "Signing $f"
            gpg --batch --yes --armor --detach-sign --output "${f}.asc" "$f"
            sigs+=( "${f}.asc" )
          done

          echo "Uploading ${#sigs[@]} signature(s) + public key to $RELEASE_TAG"
          gh release upload "$RELEASE_TAG" "${sigs[@]}" kubefront-linux-signing-pubkey.asc --clobber
