name: Release

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: kube-front
            archive_name: KubeFront
            archive_ext: tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: kube-front.exe
            archive_name: KubeFront
            archive_ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          chmod +x dist/${{ matrix.binary_name }}
          tar -czvf dist/${{ matrix.archive_name }}-${{ github.event.release.tag_name }}-${{ matrix.target }}.${{ matrix.archive_ext }} -C dist ${{ matrix.binary_name }}

      - name: Prepare artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          7z a dist/${{ matrix.archive_name }}-${{ github.event.release.tag_name }}-${{ matrix.target }}.${{ matrix.archive_ext }} ./dist/${{ matrix.binary_name }}

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.${{ matrix.archive_ext }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
