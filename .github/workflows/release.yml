name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: kube-front
            archive_name: KubeFront
            archive_ext: tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: kube-front.exe
            archive_name: KubeFront
            archive_ext: tar.gz   # Using tar.gz on Windows too for consistency and reliability

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          chmod +x dist/${{ matrix.binary_name }}
          tar -czvf dist/${{ matrix.archive_name }}-${{ github.event.release.tag_name }}-${{ matrix.target }}.${{ matrix.archive_ext }} -C dist ${{ matrix.binary_name }}

      - name: Prepare artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          # Use tar instead of 7z for better reliability on GitHub runners
          tar -czvf dist/${{ matrix.archive_name }}-${{ github.event.release.tag_name }}-${{ matrix.target }}.${{ matrix.archive_ext }} -C dist ${{ matrix.binary_name }}

      - name: List prepared artifacts
        run: ls -la dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}-${{ github.event.release.tag_name }}-${{ matrix.target }}
          path: dist/*.${{ matrix.archive_ext }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List downloaded files (for debugging)
        run: |
          echo "=== Files in release-artifacts ==="
          find release-artifacts -type f -ls || true
          ls -la release-artifacts/ || true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          # This will attach the files to the release that triggered this workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
