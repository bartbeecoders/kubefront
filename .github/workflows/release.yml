name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: kube-front
            archive_name: KubeFront
            archive_ext: tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: kube-front.exe
            archive_name: KubeFront
            archive_ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Linux artifact
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          chmod +x dist/${{ matrix.binary_name }}
          tar -czvf dist/${{ matrix.archive_name }}-${{ github.event.release.tag_name }}-${{ matrix.target }}.${{ matrix.archive_ext }} -C dist ${{ matrix.binary_name }}

      - name: Prepare Windows artifact
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          7z a dist/${{ matrix.archive_name }}-${{ github.event.release.tag_name }}-${{ matrix.target }}.${{ matrix.archive_ext }} ./dist/${{ matrix.binary_name }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}-${{ github.event.release.tag_name }}-${{ matrix.target }}
          path: dist/*.${{ matrix.archive_ext }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la artifacts/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          # You can also add release notes generation here if desired
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
